name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: CLI --version
        run: node bin/cli.js --version

      - name: CLI --help
        run: node bin/cli.js --help

      - name: CLI status
        run: node bin/cli.js status

      - name: Validate package.json
        run: node -e "const p = require('./package.json'); console.log(p.name + '@' + p.version + ' ✓');"

      - name: Run plugin consistency tests
        run: npm test
